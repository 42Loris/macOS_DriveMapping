# ---------------------------------------------------------------------------
# DriveMapping configuration
# Edit this file only — do not touch the other scripts.
# ---------------------------------------------------------------------------

# One SMB URL per line. The share name is used as the mountpoint and log label.
# smb://server/sharename → mounts at /Volumes/sharename
DRIVE_URLS=(
    "smb://fileserver.corp.example.com/shared"
    "smb://fileserver.corp.example.com/home"
)

# ---------------------------------------------------------------------------
# Kerberos ticket settings
# ---------------------------------------------------------------------------

# Kerberos realm to verify before mounting (e.g. "CORP.EXAMPLE.COM").
# Leave empty to skip realm-specific check and just verify any valid TGT exists.
KERBEROS_REALM=""

# Seconds to wait for a Kerberos ticket before giving up and attempting mounts anyway.
# Increase this if Platform SSO / Kerberos SSO Extension is slow on your network.
# Set to 0 to disable waiting entirely.
TICKET_WAIT_TIMEOUT=30

# How often (in seconds) to poll for the Kerberos ticket while waiting.
TICKET_RETRY_INTERVAL=5
