# Drives — parallel arrays (url / mountpoint / label must stay in sync).
# Add or remove entries as a group; keep the same number of elements in each.
DRIVE_URLS=(
    "smb://fileserver.corp.example.com/shared"
    "smb://fileserver.corp.example.com/home"
)

DRIVE_MOUNTPOINTS=(
    "/Volumes/Shared"
    "/Volumes/Home"
)

DRIVE_LABELS=(
    "Shared Drive"
    "Home Drive"
)
